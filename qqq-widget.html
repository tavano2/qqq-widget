<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QQQ/TQQQ 전략</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #080d14;
    --bg-panel:   #0d1521;
    --bg-card:    #111c2b;
    --border:     #1e3048;
    --accent-buy: #00e5a0;
    --accent-sell:#ff4d6d;
    --accent-hold:#f0b429;
    --accent-blue:#4a9eff;
    --text-primary:#e8f0fe;
    --text-secondary:#7a96b5;
    --text-muted: #3d5a78;
    --ma3:        #f59e0b;
    --ma161:      #3b82f6;
    --ma185:      #10b981;
    --env185:     #ef4444;
    --price-line: #c8d6e8;
    --grid:       #1a2d42;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'Noto Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #root {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 10px 12px 8px;
    gap: 6px;
    position: relative;
  }

  /* ─── 헤더 ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .header-title span {
    color: var(--accent-blue);
  }

  .signal-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid currentColor;
  }
  .signal-buy  { color: var(--accent-buy);  border-color: var(--accent-buy); }
  .signal-sell { color: var(--accent-sell); border-color: var(--accent-sell); }
  .signal-hold { color: var(--accent-hold); border-color: var(--accent-hold); }
  .signal-wait { color: var(--text-secondary); border-color: var(--text-muted); }

  /* ─── 가격 행 ─── */
  .price-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .price-main {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .price-ticker {
    font-size: 11px;
    color: var(--text-secondary);
    margin-right: 4px;
    font-weight: 400;
  }

  .price-change {
    font-family: var(--font-mono);
    font-size: 11px;
    margin-top: 3px;
  }
  .up   { color: var(--accent-buy); }
  .down { color: var(--accent-sell); }

  .right-meta {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .meta-row {
    font-family: var(--font-body);
    font-size: 10px;
    color: var(--text-secondary);
  }

  .meta-label {
    color: var(--text-muted);
    margin-right: 4px;
  }

  .meta-val-buy  { color: var(--accent-buy); }
  .meta-val-sell { color: var(--accent-sell); }

  /* ─── 구분선 ─── */
  .divider {
    height: 1px;
    background: var(--border);
  }

  /* ─── 그래프 ─── */
  #graph-canvas {
    width: 100%;
    border-radius: 4px;
    display: block;
  }

  /* ─── 하단 ─── */
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .stat-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-line {
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-label {
    color: var(--text-muted);
    font-size: 9px;
    min-width: 28px;
  }

  .stat-val {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
  }

  /* ─── 상태/갱신 ─── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-line {
    font-size: 9px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 9px;
    font-family: var(--font-mono);
    padding: 2px 6px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: color 0.15s, border-color 0.15s;
  }
  .refresh-btn:hover { color: var(--accent-blue); border-color: var(--accent-blue); }

  /* ─── 로딩/에러 오버레이 ─── */
  #overlay {
    position: absolute; inset: 0;
    background: var(--bg-deep);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    z-index: 10;
  }
  #overlay.hidden { display: none; }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay-text {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
  }

  .error-text {
    font-size: 10px;
    color: var(--accent-sell);
    text-align: center;
    padding: 0 16px;
    line-height: 1.5;
  }

  /* ─── 포지션 모달 ─── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(8,13,20,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  #modal-overlay.hidden { display: none; }

  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    width: calc(100% - 40px);
    max-width: 300px;
  }

  .modal-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-blue);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .modal-field {
    margin-bottom: 8px;
  }

  .modal-label {
    font-size: 9px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
    margin-bottom: 3px;
    display: block;
  }

  .modal-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--accent-blue); }

  .modal-toggle {
    display: flex; gap: 6px;
  }

  .toggle-btn {
    flex: 1;
    padding: 5px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .toggle-btn.active-buy  { background: rgba(0,229,160,0.12); border-color: var(--accent-buy); color: var(--accent-buy); }
  .toggle-btn.active-none { background: rgba(255,77,109,0.10); border-color: var(--accent-sell); color: var(--accent-sell); }

  .modal-actions {
    display: flex; gap: 6px; margin-top: 12px;
  }

  .modal-btn {
    flex: 1; padding: 7px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .modal-btn:hover { opacity: 0.8; }
  .modal-btn-save   { background: var(--accent-blue); color: #000; }
  .modal-btn-delete { background: var(--accent-sell); color: #fff; }
  .modal-btn-cancel { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); }
</style>
</head>
<body>

<div id="root">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-title">QQQ / <span>TQQQ</span> 전략</div>
    <div id="signal-badge" class="signal-badge signal-wait">로딩중</div>
  </div>

  <!-- 가격 행 -->
  <div class="price-row">
    <div>
      <div class="price-main">
        <span class="price-ticker">TQQQ</span>
        <span id="tqqq-price">--</span>
      </div>
      <div id="tqqq-change" class="price-change">-- (--)</div>
    </div>
    <div class="right-meta">
      <div class="meta-row">
        <span class="meta-label">상태</span>
        <span id="state-val">--</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">매도선</span>
        <span id="sellline-val">--</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">QQQ</span>
        <span id="qqq-price-val">--</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 그래프 -->
  <canvas id="graph-canvas" height="58"></canvas>

  <div class="divider"></div>

  <!-- 하단 통계 -->
  <div class="bottom-row">
    <div class="stat-group">
      <div class="stat-line">
        <span class="stat-label">진입일</span>
        <span id="entry-date" class="stat-val">--</span>
      </div>
      <div class="stat-line">

    </div>
    <div class="stat-group" style="text-align:right; align-items:flex-end;">
      <div class="stat-line">

      </div>
      <div class="stat-line">
        <span class="stat-label">평단</span>

      </div>
    </div>
  </div>

  <!-- 하단 푸터 -->
  <div class="footer">
    <div id="updated-at" class="status-line">--</div>
    <button class="refresh-btn" onclick="openPositionModal()">POS</button>
  </div>

  <!-- 로딩/에러 오버레이 -->
  <div id="overlay">
    <div class="spinner"></div>
    <div class="overlay-text">데이터 로딩 중...</div>
  </div>
</div>

<!-- 포지션 모달 -->
<div id="modal-overlay" class="hidden">
  <div class="modal">
    <div class="modal-title">POSITION EDIT</div>

    <div class="modal-field">
      <span class="modal-label">보유 여부</span>
      <div class="modal-toggle">
        <div id="toggle-yes" class="toggle-btn" onclick="setToggle(true)">보유</div>

      <div class="modal-field">
        <span class="modal-label">평균 단가 ($)</span>
        <input id="inp-avg"   class="modal-input" type="number" placeholder="0.00" inputmode="decimal">
      </div>
      <div class="modal-field">
        <span class="modal-label">진입일 (YYYY-MM-DD)</span>
        <input id="inp-date"  class="modal-input" type="text" placeholder="2024-01-01">

    <div class="modal-actions">
      <button class="modal-btn modal-btn-save"   onclick="savePosition()">저장</button>
      <button class="modal-btn modal-btn-delete" onclick="deletePosition()">삭제</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 설정
// ============================================================
const SETTINGS = {
  qqqSymbol:    "QQQ",
  tqqqSymbol:   "TQQQ",
  shortMA:      3,
  sellMA:       161,
  baseMA:       185,
  envelopePct:  0.05,
  historyRange: "3y",
  graphDays:    90,
  refreshMinutes: 30
}

// CORS 프록시 목록 (순서대로 시도)
const CORS_PROXIES = [
  (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  (url) => `https://thingproxy.freeboard.io/fetch/${url}`,
]

async function fetchWithProxyFallback(targetUrl) {
  let lastErr
  for (const proxyFn of CORS_PROXIES) {
    try {
      const proxyUrl = proxyFn(targetUrl)
      const res = await fetch(proxyUrl, {
        headers: { "User-Agent": "Mozilla/5.0" },
        signal: AbortSignal.timeout(8000)
      })
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      const text = await res.text()
      return JSON.parse(text)
    } catch(e) {
      lastErr = e
    }
  }
  throw new Error(`모든 프록시 실패: ${lastErr?.message}`)
}

// ============================================================
// Yahoo Finance
// ============================================================
async function fetchYahooDailyHistory(symbol, range = "3y") {
  const baseUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=${range}&interval=1d&includePrePost=false&events=div%2Csplits`

  const json = await fetchWithProxyFallback(baseUrl)

  const result = json?.chart?.result?.[0]
  if (!result) return []

  const timestamps = result.timestamp || []
  const quote = result.indicators?.quote?.[0] || {}
  const closes  = quote.close  || []
  const opens   = quote.open   || []
  const highs   = quote.high   || []
  const lows    = quote.low    || []
  const volumes = quote.volume || []

  const rows = []
  for (let i = 0; i < timestamps.length; i++) {
    const close = closes[i]
    if (close == null) continue
    rows.push({
      date:   new Date(timestamps[i] * 1000),
      open:   opens[i],
      high:   highs[i],
      low:    lows[i],
      close:  close,
      volume: volumes[i]
    })
  }
  return rows
}

async function fetchCurrentPrice(symbol, fallbackHist = []) {
  try {
    const baseUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=5d&interval=1m&includePrePost=true`
    const json = await fetchWithProxyFallback(baseUrl)

    const result = json?.chart?.result?.[0]
    const meta  = result?.meta || {}
    const quote = result?.indicators?.quote?.[0] || {}
    const closes = quote.close || []

    let lastClose = null
    for (let i = closes.length - 1; i >= 0; i--) {
      if (closes[i] != null) { lastClose = closes[i]; break }
    }

    const price = meta.regularMarketPrice ?? meta.previousClose ?? lastClose
    const prevClose = meta.chartPreviousClose ?? meta.previousClose ?? null

    return {
      price:      price     != null ? Number(price)     : null,
      previousClose: prevClose != null ? Number(prevClose) : null,
      change:     prevClose != null && price != null ? Number(price) - Number(prevClose) : null,
      changePct:  prevClose != null && price != null ? ((Number(price) / Number(prevClose)) - 1) * 100 : null,
      marketTime: meta.regularMarketTime ? new Date(meta.regularMarketTime * 1000) : new Date()
    }
  } catch(e) {
    const last = fallbackHist[fallbackHist.length - 1]
    const prev = fallbackHist[fallbackHist.length - 2]
    return {
      price:      last ? last.close : null,
      previousClose: prev ? prev.close : null,
      change:     last && prev ? last.close - prev.close : null,
      changePct:  last && prev ? ((last.close / prev.close) - 1) * 100 : null,
      marketTime: last ? last.date : new Date()
    }
  }
}

// ============================================================
// 지표 계산
// ============================================================
function sma(values, endIdx, period) {
  if (endIdx - period + 1 < 0) return null
  let sum = 0
  for (let i = endIdx - period + 1; i <= endIdx; i++) {
    if (values[i] == null) return null
    sum += values[i]
  }
  return sum / period
}

function buildIndicators(rows) {
  const closes = rows.map(r => r.close)
  return rows.map((row, idx) => {
    const ma3    = sma(closes, idx, SETTINGS.shortMA)
    const ma161  = sma(closes, idx, SETTINGS.sellMA)
    const ma185  = sma(closes, idx, SETTINGS.baseMA)
    const envUpper = ma185 != null ? ma185 * (1 + SETTINGS.envelopePct) : null
    return { ...row, ma3, ma161, ma185, envUpper }
  })
}

// ============================================================
// 전략 시뮬레이션
// ============================================================
function toDateKey(date) {
  const d = new Date(date)
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}

function getNearestTQQQClose(targetDate, tqqqRows) {
  const key = toDateKey(targetDate)
  for (let i = tqqqRows.length - 1; i >= 0; i--) {
    if (toDateKey(tqqqRows[i].date) === key) return tqqqRows[i].close
  }
  for (let i = tqqqRows.length - 1; i >= 0; i--) {
    if (tqqqRows[i].date <= targetDate) return tqqqRows[i].close
  }
  return tqqqRows[tqqqRows.length - 1]?.close ?? null
}

function simulateStrategy(qqqRows, tqqqRows, currentTQQQ) {
  let state = "미보유"
  let activeSellLine = "-"
  let entryDate = null, entryPrice = null, entryReason = "-"
  let exitDate = null, exitPrice = null
  let todaySignal = "관망", todayReason = "-"

  for (let i = 1; i < qqqRows.length; i++) {
    const prev = qqqRows[i - 1]
    const curr = qqqRows[i]

    if (![prev.ma3, prev.ma161, prev.ma185, prev.envUpper,
          curr.ma3, curr.ma161, curr.ma185, curr.envUpper].every(v => v != null)) continue

    const tqqqPrice = getNearestTQQQClose(curr.date, tqqqRows)
    const hadPosition = state !== "미보유"

    const crossDown161Today = prev.ma3 >= prev.ma161 && curr.ma3 < curr.ma161
    const crossUp185Today   = prev.ma3 < prev.ma185  && curr.ma3 >= curr.ma185

    const normalState    = curr.ma3 > curr.ma161
    const exceptionState = curr.envUpper > curr.ma161 && curr.ma161 > curr.ma3 && curr.ma3 > curr.ma185
    const below185State  = curr.ma3 < curr.ma185
    const bandEntry      = curr.ma3 >= curr.ma185 && curr.ma3 <= curr.envUpper

    let tradedToday = false

    if (crossDown161Today) {
      if (hadPosition) {
        state = "미보유"; activeSellLine = "-"
        exitDate = curr.date; exitPrice = tqqqPrice
        todaySignal = "매도"; todayReason = "3일선 161일선 하향돌파(당일 예외매수 금지)"
      } else {
        state = "미보유"; activeSellLine = "-"
        todaySignal = "관망"; todayReason = "3일선 161일선 하향돌파(당일 예외매수 금지)"
      }
      tradedToday = true
    }

    if (!tradedToday && hadPosition) {
      if (below185State) {
        state = "미보유"; activeSellLine = "-"
        exitDate = curr.date; exitPrice = tqqqPrice
        todaySignal = "매도"; todayReason = "3일선 185일선 하향이탈"
        tradedToday = true
      } else if (exceptionState) {
        const wasException = state === "보유(예외)"
        state = "보유(예외)"; activeSellLine = "185일선"
        todaySignal = "보유"; todayReason = wasException ? "예외 상태 유지" : "예외 상태 전환"
      } else if (normalState) {
        const wasNormal = state === "보유(기본)"
        state = "보유(기본)"; activeSellLine = "161일선"
        todaySignal = "보유"; todayReason = wasNormal ? "기본 상태 유지" : "기본 상태 복귀"
      } else {
        state = "미보유"; activeSellLine = "-"
        todaySignal = "관망"; todayReason = "재진입 조건 미충족"
      }
    }

    if (!tradedToday && state === "미보유") {
      if (exceptionState) {
        state = "보유(예외)"; activeSellLine = "185일선"
        entryDate = curr.date; entryPrice = tqqqPrice
        entryReason = "예외 배열 진입"
        todaySignal = "매수"; todayReason = "예외 배열 진입"
        tradedToday = true
      } else if ((crossUp185Today || bandEntry) && normalState) {
        state = "보유(기본)"; activeSellLine = "161일선"
        entryDate = curr.date; entryPrice = tqqqPrice
        entryReason = crossUp185Today ? "185일선 상향돌파" : "185일선 +5% 밴드 진입"
        todaySignal = "매수"; todayReason = entryReason
        tradedToday = true
      } else {
        state = "미보유"; activeSellLine = "-"
        todaySignal = "관망"; todayReason = below185State ? "3일선 185일선 아래" : "진입 조건 미충족"
      }
    }
  }

  const effectiveCurrentPrice = currentTQQQ?.price ?? tqqqRows[tqqqRows.length - 1]?.close ?? null

  let strategyReturnPct = null
  if (state !== "미보유" && entryPrice != null && effectiveCurrentPrice != null) {
    strategyReturnPct = ((effectiveCurrentPrice / entryPrice) - 1) * 100
  }

  return { state, activeSellLine, entryDate, entryPrice, entryReason,
           exitDate, exitPrice, todaySignal, todayReason, strategyReturnPct }
}

// ============================================================
// 포지션 (localStorage)
// ============================================================
const POS_KEY = "qqq_tqqq_position"

function loadPosition() {
  try {
    const raw = localStorage.getItem(POS_KEY)
    if (!raw) return defaultPos()
    const j = JSON.parse(raw)
    return {
      hasPosition: !!j.hasPosition,
      quantity:    Number(j.quantity  || 0),
      avgPrice:    Number(j.avgPrice  || 0),
      entryDate:   String(j.entryDate || ""),
      memo:        String(j.memo      || "")
    }
  } catch(e) { return defaultPos() }
}

function savePos(p) { localStorage.setItem(POS_KEY, JSON.stringify(p)) }
function defaultPos() { return { hasPosition: false, quantity: 0, avgPrice: 0, entryDate: "", memo: "" } }

// ============================================================
// 포맷 유틸
// ============================================================
function fmtPrice(v) {
  if (v == null || !isFinite(v)) return "--"
  return `$${Number(v).toFixed(2)}`
}
function fmtSignedPrice(v) {
  if (v == null || !isFinite(v)) return "--"
  return `${v >= 0 ? "+" : "-"}$${Math.abs(v).toFixed(2)}`
}
function fmtPct(v) {
  if (v == null || !isFinite(v)) return "--"
  return `${v >= 0 ? "+" : ""}${v.toFixed(2)}%`
}
function fmtDate(d) {
  if (!d) return "--"
  if (typeof d === "string") return d
  return toDateKey(d)
}

// ============================================================
// 그래프
// ============================================================
function drawGraph(rows, canvas) {
  const dpr = window.devicePixelRatio || 1
  const W = canvas.offsetWidth
  const H = canvas.offsetHeight || 58

  canvas.width  = W * dpr
  canvas.height = H * dpr

  const ctx = canvas.getContext("2d")
  ctx.scale(dpr, dpr)

  // 배경
  ctx.fillStyle = "#0b1220"
  const r = 4
  ctx.beginPath()
  ctx.moveTo(r, 0); ctx.lineTo(W - r, 0)
  ctx.arcTo(W, 0, W, r, r)
  ctx.lineTo(W, H - r)
  ctx.arcTo(W, H, W - r, H, r)
  ctx.lineTo(r, H)
  ctx.arcTo(0, H, 0, H - r, r)
  ctx.lineTo(0, r)
  ctx.arcTo(0, 0, r, 0, r)
  ctx.closePath()
  ctx.fill()

  const series = [
    { key: "close",    color: "#c8d6e8", lw: 1.6 },
    { key: "ma3",      color: "#f59e0b", lw: 1.3 },
    { key: "ma161",    color: "#3b82f6", lw: 1.1 },
    { key: "ma185",    color: "#10b981", lw: 1.1 },
    { key: "envUpper", color: "#ef4444", lw: 1.0 }
  ]

  const allVals = []
  for (const row of rows) {
    for (const s of series) {
      const v = row[s.key]
      if (v != null && isFinite(v)) allVals.push(v)
    }
  }
  if (!allVals.length) return

  let minV = Math.min(...allVals)
  let maxV = Math.max(...allVals)
  if (maxV === minV) { maxV += 1; minV -= 1 }

  const pad = { t: 5, r: 3, b: 5, l: 3 }
  const cW = W - pad.l - pad.r
  const cH = H - pad.t - pad.b

  // 그리드
  ctx.strokeStyle = "#1a2d42"
  ctx.lineWidth = 0.5
  for (let i = 0; i <= 2; i++) {
    const y = pad.t + (cH / 2) * i
    ctx.beginPath()
    ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cW, y)
    ctx.stroke()
  }

  // 각 시리즈 그리기
  for (const s of series) {
    const pts = []
    for (let i = 0; i < rows.length; i++) {
      const v = rows[i][s.key]
      if (v == null || !isFinite(v)) continue
      const x = pad.l + (rows.length === 1 ? 0 : (i / (rows.length - 1)) * cW)
      const y = pad.t + cH - ((v - minV) / (maxV - minV)) * cH
      pts.push([x, y])
    }
    if (pts.length < 2) continue

    ctx.beginPath()
    ctx.moveTo(pts[0][0], pts[0][1])
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1])
    ctx.strokeStyle = s.color
    ctx.lineWidth = s.lw
    ctx.stroke()
  }

  // 범례
  const legend = [
    { label: "C",   color: "#c8d6e8" },
    { label: "3",   color: "#f59e0b" },
    { label: "161", color: "#3b82f6" },
    { label: "185", color: "#10b981" },
    { label: "+5%", color: "#ef4444" }
  ]
  ctx.font = "7px 'Space Mono', monospace"
  let lx = pad.l + 3
  for (const l of legend) {
    ctx.fillStyle = l.color
    ctx.fillText(l.label, lx, pad.t + 7)
    lx += ctx.measureText(l.label).width + 7
  }
}

// ============================================================
// UI 렌더
// ============================================================
function renderUI(data) {
  const { today, strategy, currentTQQQ, graphData, manualPosition } = data

  // 신호 뱃지
  const badge = document.getElementById("signal-badge")
  const signalMap = { "매수": ["매  수", "signal-buy"], "매도": ["매  도", "signal-sell"],
                      "보유": ["보  유", "signal-hold"], "관망": ["관  망", "signal-wait"] }
  const [signalLabel, signalClass] = signalMap[strategy.todaySignal] || ["관  망", "signal-wait"]
  badge.textContent = signalLabel
  badge.className = `signal-badge ${signalClass}`

  // TQQQ 가격
  document.getElementById("tqqq-price").textContent = fmtPrice(currentTQQQ.price)
  const chg = currentTQQQ.changePct
  const chgEl = document.getElementById("tqqq-change")
  chgEl.textContent = `${fmtSignedPrice(currentTQQQ.change)} (${fmtPct(chg)})`
  chgEl.className = "price-change " + (chg != null && chg >= 0 ? "up" : "down")

  // 우측 메타
  document.getElementById("state-val").textContent = strategy.state
  document.getElementById("sellline-val").textContent = strategy.activeSellLine
  document.getElementById("qqq-price-val").textContent = fmtPrice(today.close)

  // 그래프
  const canvas = document.getElementById("graph-canvas")
  setTimeout(() => drawGraph(graphData, canvas), 0)

  // 하단 통계
  document.getElementById("entry-date").textContent = fmtDate(strategy.entryDate)

  const srEl = document.getElementById("strategy-return")
  srEl.textContent = fmtPct(strategy.strategyReturnPct)
  srEl.style.color = strategy.strategyReturnPct != null
    ? (strategy.strategyReturnPct >= 0 ? "var(--accent-buy)" : "var(--accent-sell)")
    : "var(--text-secondary)"

  // 실제 포지션
  if (manualPosition.hasPosition) {
    const actualReturn = manualPosition.avgPrice > 0 && currentTQQQ.price != null
      ? ((currentTQQQ.price / manualPosition.avgPrice) - 1) * 100 : null

    const arEl = document.getElementById("actual-return")
    arEl.textContent = fmtPct(actualReturn)
    arEl.style.color = actualReturn != null
      ? (actualReturn >= 0 ? "var(--accent-buy)" : "var(--accent-sell)")
      : "var(--text-secondary)"

    document.getElementById("avg-price").textContent = fmtPrice(manualPosition.avgPrice)
  } else {
    document.getElementById("actual-return").textContent = "미보유"
    document.getElementById("actual-return").style.color = "var(--text-muted)"
    document.getElementById("avg-price").textContent = "--"
  }

  // 갱신 시간
  const now = new Date()
  document.getElementById("updated-at").textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} UPD`
}

// ============================================================
// 메인 로드
// ============================================================
async function loadData() {
  const overlay = document.getElementById("overlay")
  overlay.classList.remove("hidden")
  overlay.innerHTML = `<div class="spinner"></div><div class="overlay-text">데이터 로딩 중...</div>`

  try {
    const [qqqHist, tqqqHist] = await Promise.all([
      fetchYahooDailyHistory(SETTINGS.qqqSymbol,  SETTINGS.historyRange),
      fetchYahooDailyHistory(SETTINGS.tqqqSymbol, SETTINGS.historyRange)
    ])

    if (!qqqHist.length || !tqqqHist.length) throw new Error("시세 데이터를 가져오지 못했습니다.")

    const qqqWithMA    = buildIndicators(qqqHist)
    const currentTQQQ  = await fetchCurrentPrice(SETTINGS.tqqqSymbol, tqqqHist)
    const strategy     = simulateStrategy(qqqWithMA, tqqqHist, currentTQQQ)
    const manualPosition = loadPosition()
    const today        = qqqWithMA[qqqWithMA.length - 1]
    const graphData    = qqqWithMA.slice(-SETTINGS.graphDays)

    overlay.classList.add("hidden")
    renderUI({ today, qqqWithMA, graphData, strategy, currentTQQQ, manualPosition })

  } catch(e) {
    overlay.innerHTML = `
      <div class="overlay-text" style="color:var(--accent-sell)">로드 실패</div>
      <div class="error-text">${e.message}</div>
      <button class="refresh-btn" onclick="loadData()" style="margin-top:8px">재시도</button>`
  }
}

// ============================================================
// 포지션 모달
// ============================================================
let _hasPos = false

function openPositionModal() {
  const pos = loadPosition()
  _hasPos = pos.hasPosition

  setToggle(_hasPos)
  document.getElementById("inp-qty").value   = pos.quantity  || ""
  document.getElementById("inp-avg").value   = pos.avgPrice  || ""
  document.getElementById("inp-date").value  = pos.entryDate || ""
  document.getElementById("inp-memo").value  = pos.memo      || ""
  document.getElementById("modal-overlay").classList.remove("hidden")
}

function closeModal() { document.getElementById("modal-overlay").classList.add("hidden") }

function setToggle(hasPos) {
  _hasPos = hasPos
  const yesBtn = document.getElementById("toggle-yes")
  const noBtn  = document.getElementById("toggle-no")
  const fields = document.getElementById("pos-fields")

  yesBtn.className = "toggle-btn" + (hasPos ? " active-buy"  : "")
  noBtn.className  = "toggle-btn" + (!hasPos ? " active-none" : "")
  fields.style.display = hasPos ? "block" : "none"
}

function savePosition() {
  const payload = {
    hasPosition: _hasPos,
    quantity:    _hasPos ? Number(document.getElementById("inp-qty").value)  || 0 : 0,
    avgPrice:    _hasPos ? Number(document.getElementById("inp-avg").value)  || 0 : 0,
    entryDate:   _hasPos ? document.getElementById("inp-date").value.trim()     : "",
    memo:        _hasPos ? document.getElementById("inp-memo").value.trim()     : ""
  }
  savePos(payload)
  closeModal()
  loadData()
}

function deletePosition() {
  savePos(defaultPos())
  closeModal()
  loadData()
}

// ============================================================
// 자동 갱신 + 초기화
// ============================================================
loadData()
setInterval(loadData, SETTINGS.refreshMinutes * 60 * 1000)

// 화면 크기 변경 시 그래프 재그리기
window.addEventListener("resize", () => {
  const canvas = document.getElementById("graph-canvas")
  if (canvas._lastData) drawGraph(canvas._lastData, canvas)
})
</script>
